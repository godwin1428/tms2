name: Appium E2E Android Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest # Required for hardware acceleration for Android Emulators

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install NPM Dependencies & Build Capacitor
      run: |
        npm install
        npx cap sync android

    - name: Build Android APK
      run: |
        cd android
        chmod +x ./gradlew
        ./gradlew assembleDebug
      
    - name: Install Appium & Drivers
      run: |
        npm install -g appium
        appium driver install uiautomator2

    - name: Install Python Test Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Appium-Python-Client selenium openpyxl pandas

    - name: Run Appium Tests on Emulator
      uses: reactivecircus/android-emulator-runner@v2
      env:
        CI_APK_PATH: ${{ github.workspace }}/android/app/build/outputs/apk/debug/app-debug.apk
      with:
        api-level: 30
        target: google_apis
        arch: x86_64
        profile: pixel_5
        script: |
          # Start Appium Server securely with autodownload in background
          appium --allow-insecure uiautomator2:chromedriver_autodownload &
          sleep 10
          
          # Execute the test suite
          python tests/appium_e2e_suite.py

    - name: Commit and Push Generated Excel Report
      if: always()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add E2E_Test_Report_TMS_*.xlsx || echo "No report found"
        git commit -m "docs: generate automated E2E Appium report [skip ci]" || echo "No changes to commit"
        git push
