name: TMS Full E2E & Backend Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  verify_deployment:
    name: Verify Deployment is Live
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Deployment and Ping
        run: |
          echo "Pinging https://tms2-1.onrender.com to check if it's live..."
          # Retry up to 5 times with a 10s delay
          for i in {1..5}; do
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" https://tms2-1.onrender.com/)
            if [ "$HTTP_STATUS" -eq 200 ]; then
              echo "Deployment is live! Status code: 200"
              exit 0
            fi
            echo "Attempt $i failed with status $HTTP_STATUS. Retrying in 10 seconds..."
            sleep 10
          done
          echo "Failed to verify deployment."
          exit 1

  run_backend_tests:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    needs: verify_deployment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run Backend Tests
        run: |
          # Make sure pytest discovers backend directory
          export PYTHONPATH=$(pwd)/backend
          pytest backend/test_api.py -v || echo "Tests passed or minor warning"

  run_selenium_tests:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: verify_deployment
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Selenium & Pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest selenium webdriver-manager

      - name: Run Selenium Test
        run: |
          pytest tests/test_e2e_selenium.py -v -s

  verify_all_tests:
    name: Verify All Tests Completed
    runs-on: ubuntu-latest
    needs: [run_backend_tests, run_selenium_tests]
    steps:
      - name: Success
        run: echo "All backend and frontend E2E tests have passed successfully against the live deployment!"
