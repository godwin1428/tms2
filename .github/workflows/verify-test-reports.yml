name: TMS E2E & Security Test Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  verify:
    name: Verify Test Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: Publish Test Results to Job Summary
        run: |
          python tests/publish_results.py

      - name: Upload E2E Test Report
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Report
          path: E2E_Test_Report_TMS_2026-06-11T13-25-23.xlsx

      - name: Upload Security Vulnerabilities Report
        uses: actions/upload-artifact@v4
        with:
          name: Security-Vulnerabilities-Report
          path: "Vulnerability Test Results/Vulnerability_Report_Post_Remediation.xlsx"
