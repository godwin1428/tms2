name: E2E Tests and Report Generation

on:
  push:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r tests/requirements.txt

      - name: Setup chromedriver permissions
        run: |
          find ~/.wdm -name "chromedriver" -type f -exec chmod +x {} \; || true

      - name: Run E2E Tests
        run: |
          pytest tests/

      - name: Commit and Push Report
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add E2E_Test_Report_TMS_*.xlsx
          # Skip CI on this commit so we don't trigger another workflow run
          git commit -m "chore: automated E2E test report [skip ci]" || echo "No changes to commit"
          git push
