name: E2E Tests and Report Generation

on:
  push:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r tests/requirements.txt

      - name: Start Backend Server
        run: |
          mkdir -p backend/uploads
          cd backend
          python seed_data.py
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          echo $! > uvicorn.pid
          # Wait until the server is accepting connections
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            echo "Waiting for backend... (${i}s)"
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/api/health || (echo "Backend failed to start" && exit 1)

      - name: Run E2E Tests
        run: |
          pytest tests/

      - name: Commit and Push Report
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add E2E_Test_Report_TMS_*.xlsx
          # Skip CI on this commit so we don't trigger another workflow run
          git commit -m "chore: automated E2E test report [skip ci]" || echo "No changes to commit"
          git push