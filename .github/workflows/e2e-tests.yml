name: E2E Tests and Report Generation

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  SECRET_KEY: tms_ci_test_secret_key_2026
  CORS_ORIGINS: "*"
  GEMINI_API_KEY: ""
  DATABASE_URL: "sqlite:///:memory:"
  PYTHONPATH: backend

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r tests/requirements.txt

      - name: Create upload directories
        run: |
          mkdir -p backend/uploads/prescriptions
          mkdir -p backend/uploads/records
          mkdir -p backend/uploads/profiles

      - name: Run API E2E Tests
        working-directory: .
        env:
          SECRET_KEY: tms_ci_test_secret_key_2026
          CORS_ORIGINS: "*"
          GEMINI_API_KEY: ""
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONPATH: ${{ github.workspace }}/tests:${{ github.workspace }}/backend
        run: |
          python -m pytest tests/test_api_e2e/ -v --tb=short 2>&1 | tee test_output.txt
          # Capture exit code from pytest (not tee)
          PYTEST_EXIT=${PIPESTATUS[0]}
          exit $PYTEST_EXIT

      - name: Print Uvicorn Log on Failure
        if: failure()
        run: cat /tmp/uvicorn.log || echo "No uvicorn.log found"

      - name: Upload Test Output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test_output.txt

      - name: Upload Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: E2E-Test-Report-${{ github.run_number }}
          path: E2E_Test_Report_TMS_*.xlsx
          retention-days: 90

      - name: Commit and Push Report
        if: always() && github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add E2E_Test_Report_TMS_*.xlsx || true
          git commit -m "chore: automated E2E test report [skip ci]" || echo "No changes to commit"
          git push || echo "Push failed (may be a PR)"
